<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Das Heilige Orakel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #e8cc7a;
    --gold-dim: #7a6230;
    --parchment: #f5edd6;
    --ink: #1a1208;
    --smoke: #2a1f0e;
    --ember: #8b3a0f;
  }

  body {
    min-height: 100vh;
    background-color: #0d0a06;
    background-image:
      radial-gradient(ellipse 80% 60% at 50% 0%, #1e1408 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 50% 100%, #1a0f05 0%, transparent 60%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'IM Fell English', serif;
    color: var(--parchment);
    padding: 2rem 1.5rem;
    overflow-x: hidden;
  }

  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: var(--gold-light);
    border-radius: 50%;
    opacity: 0;
    animation: twinkle var(--dur) var(--delay) infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; }
    50% { opacity: var(--bright); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 700px;
    width: 100%;
    text-align: center;
  }

  .ornament {
    color: var(--gold);
    font-size: 1.4rem;
    letter-spacing: 0.5rem;
    opacity: 0.7;
    margin-bottom: 0.5rem;
    display: block;
  }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.2rem, 4vw, 2rem);
    color: var(--gold-light);
    letter-spacing: 0.15em;
    line-height: 1.3;
    text-shadow: 0 0 40px rgba(201, 168, 76, 0.4);
    margin-bottom: 0.3rem;
  }

  .subtitle {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.35em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.5rem 0;
    color: var(--gold-dim);
    font-size: 1rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
  }

  .scroll-frame {
    position: relative;
    background: linear-gradient(160deg, #1c1408 0%, #120e06 100%);
    border: 1px solid var(--gold-dim);
    border-radius: 4px;
    padding: 3rem 2.5rem;
    margin: 1rem 0 2rem;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      inset 0 0 60px rgba(0,0,0,0.6),
      0 0 1px var(--gold-dim),
      0 4px 30px rgba(0,0,0,0.8);
  }
  .scroll-frame::before, .scroll-frame::after {
    content: '✦';
    position: absolute;
    color: var(--gold-dim);
    font-size: 0.7rem;
  }
  .scroll-frame::before { top: 10px; left: 14px; }
  .scroll-frame::after  { bottom: 10px; right: 14px; }

  .corner-tl, .corner-tr, .corner-bl, .corner-br {
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--gold-dim);
    border-style: solid;
    opacity: 0.6;
  }
  .corner-tl { top: 4px; left: 4px;  border-width: 1px 0 0 1px; }
  .corner-tr { top: 4px; right: 4px; border-width: 1px 1px 0 0; }
  .corner-bl { bottom: 4px; left: 4px;  border-width: 0 0 1px 1px; }
  .corner-br { bottom: 4px; right: 4px; border-width: 0 1px 1px 0; }

  #quote-text {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(1.1rem, 3vw, 1.5rem);
    line-height: 1.7;
    color: var(--parchment);
    text-shadow: 0 0 20px rgba(245, 237, 214, 0.1);
    opacity: 1;
    transition: opacity 0.4s ease;
  }
  #quote-text.fading { opacity: 0; }

  .quote-author {
    margin-top: 1.5rem;
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--gold-dim);
    text-transform: uppercase;
    opacity: 0.8;
  }

  .btn-wrapper {
    position: relative;
    display: inline-block;
  }

  button {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold-light);
    background: transparent;
    border: 1px solid var(--gold-dim);
    padding: 1rem 2.5rem;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  button::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(201, 168, 76, 0);
    transition: background 0.3s ease;
  }
  button:hover { border-color: var(--gold); color: #fff; letter-spacing: 0.35em; }
  button:hover::before { background: rgba(201, 168, 76, 0.07); }
  button:active { transform: scale(0.97); }

  .counter {
    margin-top: 1.5rem;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--gold-dim);
    opacity: 0.6;
  }

  .flicker {
    animation: flicker 8s infinite;
  }
  @keyframes flicker {
    0%,96%,100% { opacity: 0.7; }
    97% { opacity: 0.3; }
    98% { opacity: 0.7; }
    99% { opacity: 0.4; }
  }

  @media (max-width: 480px) {
    .scroll-frame { padding: 2rem 1.5rem; }
    button { padding: 0.9rem 2rem; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <span class="ornament flicker">— ✦ ✦ ✦ —</span>
  <h1>Das Heilige Orakel</h1>
  <p class="subtitle">der dummen Weisheiten</p>

  <div class="divider">☽</div>

  <div class="scroll-frame">
    <div class="corner-tl"></div>
    <div class="corner-tr"></div>
    <div class="corner-bl"></div>
    <div class="corner-br"></div>
    <div>
      <p id="quote-text">„Wer nicht fragt, bleibt dumm. Aber wer zu viel fragt, auch."</p>
      <p class="quote-author">— Das Orakel spricht —</p>
    </div>
  </div>

  <button id="btn" onclick="newQuote()">✦ &nbsp; Neue Weisheit empfangen &nbsp; ✦</button>

  <p class="counter" id="counter"></p>
</div>

<script>
// ═══════════════════════════════════════════════════════
//   D E I N E   W E I S H E I T E N   —  hier eintragen
// ═══════════════════════════════════════════════════════
const weisheiten = [
  "Wer nicht fragt, bleibt dumm. Aber wer zu viel fragt, auch.",
  "Eine Banane ist wie ein Lächeln — von innen gelb, von außen gelb.",
  "Pizza ist rund. Die Erde ist rund. Zufall? Ich denke nicht.",
  "Der frühe Vogel kann mich mal.",
  "Wasser ist nass, aber ist Nass auch Wasser?",
  "Wer schläft, sündigt nicht. Wer nie sündigt, schläft also ewig.",
  "Man sagt, Geld macht nicht glücklich. Aber Armut macht auch keinen Spaß.",
  "Wenn alle dasselbe denken, denkt keiner besonders viel.",
  "Ich bin nicht faul — ich spare Energie für wichtigere Dinge.",
  "Ein Apfel am Tag hält den Arzt fern. Aber ein Arzt am Tag hält auch den Arzt fern.",
  "Lügen haben kurze Beine. Deswegen sollte man immer schnell laufen.",
  "Der Unterschied zwischen einem Genie und einem Dummkopf ist, dass das Genie weiß, wann es aufhören soll.",
  "Wenn das Leben dir Zitronen gibt, frag dich: Warum hat das Leben Zitronen?",
  "Schweigen ist Gold. Reden ist Silber. Döner ist Kebab.",
  "Man lernt nie aus. Außer vielleicht nach der Schule.",
];

let letzteIndex = -1;
let angezeigt = 0;

function newQuote() {
  const text = document.getElementById('quote-text');
  text.classList.add('fading');
  setTimeout(() => {
    let idx;
    do { idx = Math.floor(Math.random() * weisheiten.length); }
    while (idx === letzteIndex && weisheiten.length > 1);
    letzteIndex = idx;
    angezeigt++;
    text.textContent = '„' + weisheiten[idx] + '"';
    text.classList.remove('fading');
    document.getElementById('counter').textContent =
      angezeigt + (angezeigt === 1 ? ' Weisheit empfangen' : ' Weisheiten empfangen');
  }, 400);
}

function createStars() {
  const el = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --dur:${3+Math.random()*5}s;
      --delay:${Math.random()*6}s;
      --bright:${0.2+Math.random()*0.6};
    `;
    el.appendChild(s);
  }
}
createStars();
</script>
</body>
</html>
